<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>TechFlow</title>
</head>

<body>
    <header>
        <div class="logo">
            <h1>TechFlow Soluções</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
                <li><a href="usuario.html">Usuários</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contato">
            <h2>Contato</h2>
            <p>Se você tiver alguma dúvida, sugestão ou precisar de suporte, não hesite em entrar em contato conosco.
                Estamos aqui para ajudar!</p>
            <form action="contato.html" method="post">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>

                <label for="assunto">Assunto:</label>
                <input type="text" id="assunto" name="assunto" required><br><br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="6" maxlength="100"
                    placeholder="Digite sua mensagem"></textarea><br><br>

                <button type="submit">Enviar</button>
        </section>
    </main>
    <footer class="footer center">
        <p>&copy; 2026 TechFlow Soluções. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
