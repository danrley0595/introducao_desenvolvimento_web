<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        thead {
            background-color: #3d3c3c;
            color: white;
        }

        tfoot {
            background-color: #ecf0f1;
            font-weight: bold;
        }

        tfoot td {
            text-align: center;
        }

        #contagem {
            text-align: left;
        }

        tbody {
            background-color: #fefcfc;
            transition: 0.9s;
        }

        tbody tr:hover {
            background-color: #757373;
        }
    </style>
</head>

<body>
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Cidade</th>

            </tr>
        </thead>
        <tbody>
            <tr>
                <td>João</td>
                <td>30</td>
                <td>São Paulo</td>
            </tr>
            <tr>
                <td>Maria</td>
                <td>25</td>
                <td>Rio de Janeiro</td>
            </tr>
            <tr>
                <td>Pedro</td>
                <td>28</td>
                <td>Belo Horizonte</td>
            </tr>
            <tr>
                <td>Ana</td>
                <td>22</td>
                <td>Brasília</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Total de alunos:</td>
                <td id="contagem">2</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
