    <h1>Cadastro de Usuários</h1>

    <section>
        <form>
            <label>Nome:</label>
            <input type="text" id="nome" maxlength="30" minlength="2" placeholder="Informe seu nome..." required />

            <br>
            <br>

            <label>E-mail:</label>
            <input type="email" id="email" placeholder="Informe seu E-mail" required />

            <br>
            <br>

            <label>Telefone:</label>
            <input type="text" id="telefone" maxlength="13" minlength="8" placeholder="Informe seu Telefone" required />

            <br>
            <br>

            <label>Senha:</label>
            <input type="password" id="senha" minlength="6" placeholder="Informe sua senha" required />
            <br>
            <br>
            <label>Sexo:</label>
            <label>Masculino</label>
            <input type="radio" name="sexo">

            <label>Feminino</label>
            <input type="radio" name="sexo">
            <br>
            <br>
            <input type="file" />
            <br>
            <br>

            <input type="checkbox" /> Aceito os termos
            <br>
            <input type="checkbox" /> Quero receber novidades
            <br>
            <br>
            <button>Cadastrar</button>




        </form>
    </section>
</body>
