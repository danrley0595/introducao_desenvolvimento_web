<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Negociação | Regularize suas Dívidas</title>
    <style>
        /* Reset básico para melhor visualização */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f4f8; /* Azul acinzentado muito claro (profissional) */
            color: #2d3748; /* Cinza escuro para leitura confortável */
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #1a365d; /* Azul marinho profundo (transmite confiança) */
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        p {
            margin-bottom: 20px;
            max-width: 500px;
            line-height: 1.5;
        }

        img {
            border: 5px solid #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 300px;
            height: auto;
            margin-bottom: 25px;
        }

        .container-input {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        label {
            font-weight: bold;
            margin-bottom: 10px;
            color: #4a5568;
        }

        input[type="text"] {
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            width: 100%;
            font-size: 18px;
            text-align: center;
            font-family: inherit;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #3182ce;
            outline: none;
        }

        /* Transformando o link em um botão de destaque */
        .btn-entrar {
            background-color: #2f855a; /* Verde escuro (sucesso/dinheiro) */
            color: #ffffff;
            text-decoration: none;
            padding: 15px 0;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn-entrar:hover {
            background-color: #276749;
            transform: translateY(-2px);
        }

        .btn-entrar:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <h1>Bem-vindo ao Portal de Negociação</h1>
    
    <p>Aqui você regulariza suas pendências financeiras e recupera seu poder de compra.</p>
    
    <img src="negocia.png" alt="Imagem ilustrativa de negociação">

    <div class="container-input">
        <label for="cpf">Informe seu CPF para ver as ofertas:</label>
        <input 
            type="text" 
            id="cpf" 
            name="cpf" 
            placeholder="000.000.000-00"
            maxlength="14">

        <a href="https://google.com" target="_blank" class="btn-entrar">
            Consultar Ofertas
        </a>
    </div>

</body>
</html>
