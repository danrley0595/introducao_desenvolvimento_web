<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal de Negociação</title>
    <style>
    	body {
            background-color: #008B8B;
            color: #000000;
            font-family: JetBrains Mono;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }img {
            border: 3px solid #008B8B;
            border-radius: 10px;
            width: 300px;
        }
        a {
            color: #000000;
            text-decoration: none;
            border: 1px solid #008B8B;
            padding: 10px;
            margin-top: 20px;
            font-size: 32px;
        }
        a:hover {
            background-color: #008B8B;
            color: 008B8B;
        }
    </style>
</head>

<body>
    <h1>Bem vindo ao Portal de negociação</h1>
    
    <p>Aqui você regulariza as suas pendências financeiras e sai com o nome limpo. </p>
    
    <img src="negocia.png" alt="Imagem negociação" width="300" height="200">

    <br>
    <p>Informe seu CPF para que possamos apresentar as melhores ofertas pra você.</p>

    <label for="cpf"></label><input 
	  type="text" 
	  id="cpf" 
	  name="cpf" 
	  maxlength="14">

	<br>
	<button><a href="https://google.com" target="_blank">Entrar</a></button>

</body>
</html>
